name: Verify and release MEGA Codex plugin

on:
  pull_request:
    paths:
      - .agents/plugins/marketplace.json
      - plugins/mega/**
      - scripts/**
      - skills.lock.json
      - .github/workflows/verify-and-release.yml
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - .agents/plugins/marketplace.json
      - plugins/mega/**
      - scripts/**
      - skills.lock.json
      - .github/workflows/verify-and-release.yml
  workflow_dispatch:

concurrency:
  group: mega-codex-plugin-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate marketplace and plugin manifest
        run: node scripts/verify-plugin.mjs
      - name: Verify canonical Skills snapshot
        run: node scripts/sync-skills.mjs --check

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Verify release version
        run: node scripts/verify-plugin.mjs --release
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
